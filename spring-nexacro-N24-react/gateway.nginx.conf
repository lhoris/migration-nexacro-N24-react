# ADR-001 1단계: Reverse Proxy 게이트웨이 (로컬 검증용)
#
# 단일 진입점(:3000)에서:
#   /             → React Host Shell (frontend/dist 정적 빌드) — 새 메인프레임
#   /nexacro/**   → 기존 Tomcat(:8080)의 Nexacro 애플리케이션 — 레거시, 그대로 유지
#   /api/**       → 향후 REST 계약 계층(ADR-003)이 붙을 자리, 지금은 Tomcat(:8080)으로 프록시만 걸어둠
#
# 실행: nginx -c $(pwd)/gateway.nginx.conf -p $(pwd)
# 종료: nginx -c $(pwd)/gateway.nginx.conf -p $(pwd) -s stop

worker_processes 1;
error_log logs/gateway-error.log;
pid logs/gateway.pid;

events {
    worker_connections 256;
}

http {
    include /opt/homebrew/etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log logs/gateway-access.log;
    sendfile on;

    server {
        listen 3000;
        server_name localhost;

        # 레거시 Nexacro — 기존 Tomcat으로 그대로 흘려보낸다
        location /nexacro/ {
            proxy_pass http://127.0.0.1:8080/nexacro/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 향후 REST 계약 계층 자리 (ADR-003) — 지금은 임시로 Tomcat에 연결
        location /api/ {
            proxy_pass http://127.0.0.1:8080/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # React Host Shell — 새 메인프레임
        location / {
            root dist;
            try_files $uri /index.html;
        }
    }
}
